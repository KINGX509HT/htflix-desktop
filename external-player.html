<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    script-src 'self' 'unsafe-inline';
    img-src 'self' data: https:;
    connect-src 'none';
    object-src 'none';
    frame-src 'none';
    base-uri 'none';
    form-action 'none';
  " />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
    html, body {
      height: 100vh; width: 100vw;
      background: transparent;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #fff;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      cursor: default;
    }
    body.idle { cursor: none; }

    /* Click-through middle area: only bars + buttons accept clicks.
       Bars are draggable for moving the window. The outer 8px gutter of
       the window stays no-drag so macOS's frameless+resizable edge-resize
       takes over — drag any edge or corner to grow/shrink the player.
       In fullscreen we kill drag entirely so the screen can't slide off. */
    body { pointer-events: none; }
    .bar, .timeline, .center-status { pointer-events: auto; }
    .bar { -webkit-app-region: drag; }
    .btn, input[type="range"], .channel-counter, .shortcuts, .window-chrome {
      -webkit-app-region: no-drag;
    }
    body.is-fullscreen .bar { -webkit-app-region: no-drag; }

    /* 8px resize gutter — invisible, sits above everything so the OS picks
       up edge drags for resize before they hit the bars/drag-region. */
    .resize-edge {
      position: fixed; z-index: 999;
      -webkit-app-region: no-drag;
      pointer-events: none;
    }
    .resize-edge.top    { top: 0; left: 0; right: 0; height: 8px; }
    .resize-edge.bottom { bottom: 0; left: 0; right: 0; height: 8px; }
    .resize-edge.left   { top: 0; bottom: 0; left: 0; width: 8px; }
    .resize-edge.right  { top: 0; bottom: 0; right: 0; width: 8px; }
    body.is-fullscreen .resize-edge { display: none; }

    /* ─────────── Bars ─────────── */
    .bar {
      position: absolute; left: 0; right: 0;
      display: flex; align-items: center;
      gap: 14px;
      transition: opacity .25s ease, transform .25s ease;
    }
    .topbar {
      top: 0; padding: 18px 26px 26px;
      background: linear-gradient(180deg, rgba(0,0,0,.88) 0%, rgba(0,0,0,.55) 55%, transparent 100%);
    }
    .bottombar {
      bottom: 0; padding: 26px 26px 18px;
      background: linear-gradient(0deg, rgba(0,0,0,.92) 0%, rgba(0,0,0,.55) 55%, transparent 100%);
    }
    body.hidden-ui .bar { opacity: 0; pointer-events: none; }
    body.hidden-ui .topbar { transform: translateY(-12px); }
    body.hidden-ui .bottombar { transform: translateY(12px); }

    /* ─────────── Buttons ─────────── */
    .btn {
      background: transparent; border: 0; color: #fff;
      cursor: pointer; padding: 8px;
      border-radius: 50%;
      display: inline-flex; align-items: center; justify-content: center;
      transition: background .15s ease, transform .1s ease, color .15s ease;
      width: 40px; height: 40px;
      flex-shrink: 0;
    }
    .btn:hover { background: rgba(255,255,255,.16); }
    .btn:active { transform: scale(.92); }
    .btn svg { width: 22px; height: 22px; stroke: currentColor; fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
    .btn svg.filled { fill: currentColor; stroke: none; }
    .btn-close { color: #fff; }
    .btn-close:hover { background: rgba(229,9,20,.85); }
    .btn-fav.active { color: #e50914; }
    .btn-fav.active svg { fill: #e50914; stroke: #e50914; }

    /* Window-chrome cluster (min / max / fullscreen) — sits in the topbar
       to the right of the channel block, ahead of the action buttons. */
    .window-chrome {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 4px 6px;
      background: rgba(255,255,255,.04);
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.06);
    }
    .window-chrome .btn { width: 32px; height: 32px; padding: 6px; }
    .window-chrome .btn svg { width: 16px; height: 16px; }

    /* ─────────── Top-left: channel block ─────────── */
    .channel-block { display: flex; align-items: center; gap: 14px; }
    .channel-logo {
      width: 44px; height: 44px; border-radius: 10px;
      background: linear-gradient(135deg, #1f1f1f 0%, #0d0d0d 100%);
      color: #888; font-weight: 700; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      border: 1px solid rgba(255,255,255,.08);
      overflow: hidden; flex-shrink: 0;
      box-shadow: 0 2px 8px rgba(0,0,0,.5);
    }
    .channel-logo img { width: 100%; height: 100%; object-fit: cover; }
    .channel-logo svg { width: 24px; height: 24px; fill: #555; }
    .channel-text { line-height: 1.2; }
    .channel-name { font-size: 16px; font-weight: 700; letter-spacing: -.2px; }
    .channel-sub  { font-size: 12px; opacity: .65; margin-top: 3px;
                    display: flex; align-items: center; gap: 5px; font-weight: 500; }
    .channel-sub svg { width: 11px; height: 11px; stroke: currentColor; fill: none; stroke-width: 2; }

    /* ─────────── Top-right ─────────── */
    .live-pill {
      background: #e50914; color: #fff; padding: 6px 12px;
      border-radius: 5px; font-size: 11px; font-weight: 800; letter-spacing: .8px;
      display: inline-flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 14px rgba(229,9,20,.45);
      margin-left: 6px;
    }
    .live-pill::before {
      content: ''; width: 7px; height: 7px; background: #fff; border-radius: 50%;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1 } 50% { opacity: .35 } }

    .spacer { flex: 1; }

    /* ─────────── Bottom controls ─────────── */
    .volume-wrap {
      display: flex; align-items: center; gap: 6px;
      padding: 0 4px;
    }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 110px; height: 4px; background: rgba(255,255,255,.2);
      border-radius: 2px; outline: none;
      transition: height .15s ease;
      cursor: pointer;
    }
    input[type="range"]:hover { height: 6px; }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 14px; height: 14px; background: #e50914;
      border-radius: 50%; cursor: pointer;
      box-shadow: 0 0 8px rgba(0,0,0,.5);
      transition: transform .1s ease;
    }
    input[type="range"]:hover::-webkit-slider-thumb { transform: scale(1.2); }

    .channel-counter {
      font-size: 13px; font-weight: 600;
      color: rgba(255,255,255,.85); padding: 0 6px;
      min-width: 50px; text-align: center;
      font-variant-numeric: tabular-nums;
    }

    .live-indicator {
      display: inline-flex; align-items: center; gap: 6px;
      color: #e50914; font-size: 12px; font-weight: 800; letter-spacing: .5px;
      padding: 0 10px;
    }
    .live-indicator::before {
      content: ''; width: 8px; height: 8px; background: #e50914; border-radius: 50%;
      animation: pulse 2s infinite;
    }

    .shortcuts {
      font-size: 11px; opacity: .58; letter-spacing: .2px;
      margin-left: auto; padding: 0 14px;
      white-space: nowrap;
    }
    .shortcuts kbd {
      background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.14);
      border-radius: 4px; padding: 1px 6px; font-family: inherit; font-size: 10.5px;
      margin: 0 1px; font-weight: 600;
    }

    /* ─────────── Progress bar ─────────── */
    .timeline {
      position: absolute; left: 0; right: 0; bottom: 0;
      height: 3px; background: rgba(255,255,255,.08);
    }
    .timeline-fill {
      position: absolute; left: 0; top: 0; bottom: 0; width: 100%;
      background: #e50914;
      box-shadow: 0 0 8px rgba(229,9,20,.6);
    }

    /* ─────────── Center play/pause flash ─────────── */
    .center-status {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(.6);
      background: rgba(0,0,0,.8); border-radius: 50%; padding: 30px;
      opacity: 0;
      pointer-events: none;
    }
    .center-status.show {
      animation: pop .55s ease-out forwards;
    }
    @keyframes pop {
      0%   { transform: translate(-50%,-50%) scale(.5); opacity: 0 }
      30%  { transform: translate(-50%,-50%) scale(1.1); opacity: 1 }
      70%  { transform: translate(-50%,-50%) scale(1); opacity: 1 }
      100% { transform: translate(-50%,-50%) scale(1.2); opacity: 0 }
    }
    .center-status svg { width: 42px; height: 42px; fill: #fff; }

    /* ─────────── Tooltips ─────────── */
    .btn[title]::after {
      content: attr(title); position: absolute;
      bottom: -32px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,.92); color: #fff;
      padding: 4px 8px; border-radius: 4px; font-size: 11px;
      white-space: nowrap; opacity: 0;
      pointer-events: none; transition: opacity .15s ease;
    }
    .topbar .btn[title]::after { bottom: -32px; top: auto; }
    .bottombar .btn[title]::after { bottom: auto; top: -32px; }
    .btn:hover[title]::after { opacity: 1; transition-delay: .4s; }
    .btn { position: relative; }
  </style>
</head>
<body class="hidden-ui" tabindex="0">

  <!-- Edge gutters for OS-native resize (frameless + resizable window) -->
  <div class="resize-edge top"></div>
  <div class="resize-edge bottom"></div>
  <div class="resize-edge left"></div>
  <div class="resize-edge right"></div>

  <!-- ───── TOP BAR ───── -->
  <div class="bar topbar">
    <button class="btn btn-close" id="btn-close" title="Close (Esc)">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>

    <div class="channel-block">
      <div class="channel-logo" id="channel-logo">
        <svg viewBox="0 0 24 24"><rect x="2" y="6" width="20" height="13" rx="2" stroke="#777" stroke-width="2" fill="none"/><path d="M8 2l4 4 4-4" stroke="#777" stroke-width="2" fill="none"/></svg>
      </div>
      <div class="channel-text">
        <div class="channel-name" id="channel-name">External Player</div>
        <div class="channel-sub" id="channel-sub">
          <svg viewBox="0 0 24 24"><path d="M5 12.55a11 11 0 0 1 14 0M1.42 9a16 16 0 0 1 21.16 0M8.53 16.11a6 6 0 0 1 6.95 0M12 20h.01"/></svg>
          <span>Live stream</span>
        </div>
      </div>
    </div>

    <div class="spacer"></div>

    <div class="window-chrome">
      <button class="btn" id="btn-min" title="Minimize">
        <svg viewBox="0 0 24 24"><line x1="5" y1="19" x2="19" y2="19"/></svg>
      </button>
      <button class="btn" id="btn-max" title="Maximize">
        <svg viewBox="0 0 24 24"><rect x="5" y="5" width="14" height="14" rx="1.5"/></svg>
      </button>
      <button class="btn" id="btn-fullscreen-top" title="Fullscreen (F)">
        <svg viewBox="0 0 24 24"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
      </button>
    </div>

    <button class="btn" id="btn-cast" title="AirPlay / Chromecast / Share">
      <svg viewBox="0 0 24 24"><path d="M2 16.1A5 5 0 0 1 5.9 20M2 12.05A9 9 0 0 1 9.95 20M2 8V6a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2h-6"/><line x1="2" y1="20" x2="2.01" y2="20"/></svg>
    </button>
    <div class="live-pill" id="live-pill">LIVE</div>
  </div>

  <!-- Center play/pause flash -->
  <div class="center-status" id="center-status">
    <svg id="center-icon" viewBox="0 0 24 24"><path d="M6 4l14 8-14 8z"/></svg>
  </div>

  <!-- ───── BOTTOM BAR ───── -->
  <div class="bar bottombar">
    <button class="btn" id="btn-play" title="Play / Pause (Space)">
      <svg id="play-icon" class="filled" viewBox="0 0 24 24"><path d="M6 4h4v16H6zM14 4h4v16h-4z"/></svg>
    </button>

    <div class="volume-wrap">
      <button class="btn" id="btn-mute" title="Mute (M)">
        <svg id="vol-icon" class="filled" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13 3a3 3 0 0 0-2-2.8v5.6c1.2-.4 2-1.5 2-2.8zm-2-7v2.06c2.9.9 5 3.6 5 6.94s-2.1 6-5 6.94V19a7 7 0 0 0 0-13.88z"/></svg>
      </button>
      <input type="range" id="volume" min="0" max="100" value="100" />
    </div>

    <button class="btn" id="btn-prev" title="Previous channel ([)">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <span class="channel-counter" id="channel-counter">—/—</span>
    <button class="btn" id="btn-next" title="Next channel (])">
      <svg viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <span class="live-indicator">LIVE</span>

    <span class="shortcuts">
      <kbd>SPACE</kbd> play · <kbd>M</kbd> mute · <kbd>F</kbd> full · <kbd>[</kbd><kbd>]</kbd> channel · <kbd>ESC</kbd> close
    </span>

    <button class="btn" id="btn-fullscreen" title="Fullscreen (F)">
      <svg viewBox="0 0 24 24"><path d="M3 9V3h6M21 9V3h-6M3 15v6h6M21 15v6h-6"/></svg>
    </button>
  </div>

  <div class="timeline"><div class="timeline-fill"></div></div>

  <script>
    // overlayAPI is exposed by overlay-preload.js via contextBridge.
    // It's a whitelisted send/on surface — no raw ipcRenderer in this world.
    const api = window.overlayAPI;
    const send = (ch, ...args) => api && api.send(ch, ...args);

    const ui = {
      body:        document.body,
      btnClose:    document.getElementById('btn-close'),
      btnPlay:     document.getElementById('btn-play'),
      playIcon:    document.getElementById('play-icon'),
      btnMute:     document.getElementById('btn-mute'),
      volIcon:     document.getElementById('vol-icon'),
      volume:      document.getElementById('volume'),
      btnPrev:     document.getElementById('btn-prev'),
      btnNext:     document.getElementById('btn-next'),
      counter:     document.getElementById('channel-counter'),
      btnFullscreen:    document.getElementById('btn-fullscreen'),
      btnFullscreenTop: document.getElementById('btn-fullscreen-top'),
      btnMin:      document.getElementById('btn-min'),
      btnMax:      document.getElementById('btn-max'),
      btnCast:     document.getElementById('btn-cast'),
      channelName: document.getElementById('channel-name'),
      channelSub:  document.getElementById('channel-sub'),
      channelLogo: document.getElementById('channel-logo'),
      livePill:    document.getElementById('live-pill'),
      centerStatus: document.getElementById('center-status'),
      centerIcon:  document.getElementById('center-icon'),
    };

    const ICON_PLAY     = '<path d="M6 4l14 8-14 8z"/>';
    const ICON_PAUSE    = '<path d="M6 4h4v16H6zM14 4h4v16h-4z"/>';
    const ICON_VOL_ON   = '<path d="M3 9v6h4l5 5V4L7 9H3zm13 3a3 3 0 0 0-2-2.8v5.6c1.2-.4 2-1.5 2-2.8zm-2-7v2.06c2.9.9 5 3.6 5 6.94s-2.1 6-5 6.94V19a7 7 0 0 0 0-13.88z"/>';
    const ICON_VOL_OFF  = '<path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51A8.796 8.796 0 0 0 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3 3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.17v2.06a8.99 8.99 0 0 0 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4 9.91 6.09 12 8.18V4z"/>';

    let state = { playing: true, muted: false, volume: 100, favorited: false };

    const setPlayIcon = () => ui.playIcon.innerHTML = state.playing ? ICON_PAUSE : ICON_PLAY;
    const setVolIcon  = () => ui.volIcon.innerHTML  = (state.muted || state.volume === 0) ? ICON_VOL_OFF : ICON_VOL_ON;
    const flashCenter = (playing) => {
      ui.centerIcon.innerHTML = playing ? ICON_PAUSE : ICON_PLAY;
      ui.centerStatus.classList.remove('show'); void ui.centerStatus.offsetWidth;
      ui.centerStatus.classList.add('show');
    };

    // Controls
    ui.btnClose.onclick      = () => send('overlay:close');
    ui.btnPlay.onclick       = () => { state.playing = !state.playing; send('overlay:toggle'); setPlayIcon(); flashCenter(state.playing); };
    ui.btnMute.onclick       = () => { state.muted = !state.muted; send('overlay:mute', state.muted); setVolIcon(); };
    ui.volume.oninput        = (e) => { state.volume = +e.target.value; state.muted = state.volume === 0; send('overlay:volume', state.volume); setVolIcon(); };
    ui.btnFullscreen.onclick    = () => send('overlay:fullscreen-toggle');
    ui.btnFullscreenTop.onclick = () => send('overlay:fullscreen-toggle');
    ui.btnMin.onclick           = () => send('overlay:minimize');
    ui.btnMax.onclick           = () => send('overlay:maximize-toggle');
    ui.btnPrev.onclick       = () => send('overlay:prev-channel');
    ui.btnNext.onclick       = () => send('overlay:next-channel');
    ui.btnCast.onclick       = () => send('overlay:cast');

    // Make sure this window is the keyboard target. mpv steals focus when
    // it spawns; without this the keydown listener below never fires.
    function grabKeyboardFocus() { try { window.focus(); document.body.focus(); } catch (_) {} }
    window.addEventListener('load',  grabKeyboardFocus);
    window.addEventListener('focus', grabKeyboardFocus);
    window.addEventListener('mousemove', grabKeyboardFocus, { once: false });
    const focusHeartbeat = setInterval(grabKeyboardFocus, 1500);
    window.addEventListener('beforeunload', () => clearInterval(focusHeartbeat));

    // Keyboard
    window.addEventListener('keydown', (e) => {
      const k = e.key;
      if      (k === ' ' || k === 'k' || k === 'K') { e.preventDefault(); ui.btnPlay.click(); }
      else if (k === 'm' || k === 'M')              { ui.btnMute.click(); }
      else if (k === 'f' || k === 'F')              { ui.btnFullscreen.click(); }
      else if (k === 'Escape' || k === 'q' || k === 'Q') { ui.btnClose.click(); }
      else if (k === '[')                           { ui.btnPrev.click(); }
      else if (k === ']')                           { ui.btnNext.click(); }
      else if (k === 'ArrowUp')                     { e.preventDefault(); ui.volume.value = Math.min(100, +ui.volume.value + 5); ui.volume.oninput({ target: ui.volume }); }
      else if (k === 'ArrowDown')                   { e.preventDefault(); ui.volume.value = Math.max(0,   +ui.volume.value - 5); ui.volume.oninput({ target: ui.volume }); }
    });

    // Auto-hide bars
    let hideTimer = null;
    function showBars() {
      ui.body.classList.remove('hidden-ui', 'idle');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => ui.body.classList.add('hidden-ui', 'idle'), 2800);
    }
    ['mousemove', 'mousedown', 'keydown', 'touchstart'].forEach(e => window.addEventListener(e, showBars));
    showBars();

    // Channel info from main. Builds the logo via setAttribute (not
    // innerHTML) so a malicious channel.logo string can't break out and
    // inject HTML/scripts into the overlay.
    api && api.on('overlay:channel', (ch) => {
      if (!ch) return;
      ui.channelName.textContent = ch.name || 'External Player';
      ui.channelSub.querySelector('span').textContent = ch.sub || 'Live stream';
      if (typeof ch.logo === 'string' && ch.logo) {
        // Allow only http(s)/data URLs for the channel logo.
        const safe = /^(https?:|data:image\/)/i.test(ch.logo);
        if (safe) {
          while (ui.channelLogo.firstChild) ui.channelLogo.removeChild(ui.channelLogo.firstChild);
          const img = document.createElement('img');
          img.src = ch.logo;
          img.alt = '';
          ui.channelLogo.appendChild(img);
        }
      }
      if (typeof ch.index === 'number' && typeof ch.total === 'number') {
        ui.counter.textContent = (ch.index + 1) + '/' + ch.total;
      }
      ui.livePill.style.display = (ch.live === false) ? 'none' : 'inline-flex';
    });

    api && api.on('overlay:state', (s) => {
      if (!s) return;
      if (typeof s.playing === 'boolean' && s.playing !== state.playing) { state.playing = s.playing; setPlayIcon(); }
      if (typeof s.muted   === 'boolean' && s.muted   !== state.muted)   { state.muted   = s.muted;   setVolIcon(); }
      if (typeof s.volume  === 'number')                                  { state.volume  = s.volume;  ui.volume.value = s.volume; setVolIcon(); }
    });

    // ── Window-state sync from main ────────────────────────────────────────
    // Swap the maximize icon to a "restore" glyph when the window is
    // maximized, and toggle the .is-fullscreen body class so the drag region
    // is suppressed (otherwise you could drag the screen off-screen).
    const ICON_MAX     = '<rect x="5" y="5" width="14" height="14" rx="1.5"/>';
    const ICON_RESTORE = '<rect x="8" y="3" width="13" height="13" rx="1.5"/><rect x="3" y="8" width="13" height="13" rx="1.5" fill="#000"/>';

    function setMaximizedIcon(maxed) {
      const svg = ui.btnMax.querySelector('svg');
      if (!svg) return;
      svg.innerHTML = maxed ? ICON_RESTORE : ICON_MAX;
      ui.btnMax.setAttribute('title', maxed ? 'Restore' : 'Maximize');
    }

    api && api.on('overlay:window-state', (s) => {
      if (!s) return;
      if (typeof s.maximized  === 'boolean') setMaximizedIcon(s.maximized);
      if (typeof s.fullscreen === 'boolean') {
        ui.body.classList.toggle('is-fullscreen', s.fullscreen);
      }
    });

    setPlayIcon(); setVolIcon();
  </script>
</body>
</html>
