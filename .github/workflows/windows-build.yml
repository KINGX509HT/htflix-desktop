name: Build Windows installer

# Builds an unsigned Windows NSIS installer (.exe) for HTFLIX Desktop.
# Trigger manually from the Actions tab, or on push to main / version tags.

on:
  workflow_dispatch:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci
        env:
          # Castlabs Electron is fetched from their GitHub releases by
          # electron-builder's electronDownload config in package.json.
          ELECTRON_SKIP_BINARY_DOWNLOAD: '0'

      - name: Download mpv for Windows
        # Pulls a portable mpv build into resources/mpv/win32-x64/ so the
        # check-mpv.js script + electron-builder extraResources both find it.
        # Queries the GitHub API for the latest release because zhongfly
        # publishes assets with date-stamped names (no static URL is stable).
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ErrorActionPreference = 'Stop'
          $mpvDir = 'resources\mpv\win32-x64'
          New-Item -ItemType Directory -Force -Path $mpvDir | Out-Null

          Write-Host "Querying latest mpv release from zhongfly/mpv-winbuild..."
          $headers = @{
            'Accept'        = 'application/vnd.github+json'
            'Authorization' = "Bearer $env:GH_TOKEN"
            'User-Agent'    = 'htflix-desktop-ci'
          }
          $rel = Invoke-RestMethod -Uri 'https://api.github.com/repos/zhongfly/mpv-winbuild/releases/latest' -Headers $headers

          # Prefer the v3 (AVX2) build for modern CPUs; fall back to base x86_64 build.
          # Exclude debug-symbol archives.
          $asset = $rel.assets | Where-Object { $_.name -like 'mpv-x86_64-v3-*.7z' -and $_.name -notlike '*dbgsym*' -and $_.name -notlike '*pdb*' } | Select-Object -First 1
          if (-not $asset) {
            $asset = $rel.assets | Where-Object { $_.name -like 'mpv-x86_64-*.7z' -and $_.name -notlike '*v3*' -and $_.name -notlike '*dbgsym*' -and $_.name -notlike '*pdb*' } | Select-Object -First 1
          }
          if (-not $asset) {
            Write-Host "Available assets in latest release:"
            $rel.assets | ForEach-Object { Write-Host "  - $($_.name)" }
            Write-Error "No suitable mpv asset found in latest release"
            exit 1
          }

          $sizeMb = [math]::Round($asset.size / 1MB, 1)
          Write-Host "Selected asset: $($asset.name) ($sizeMb MB)"

          $archive = "$env:RUNNER_TEMP\mpv.7z"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $archive -UseBasicParsing
          Write-Host "Downloaded to $archive"

          Write-Host "Extracting to $mpvDir"
          & 'C:\Program Files\7-Zip\7z.exe' x $archive "-o$mpvDir" -y | Out-Null

          if (-not (Test-Path "$mpvDir\mpv.exe")) {
            Write-Host "mpv.exe NOT found at root — listing extracted tree:"
            Get-ChildItem $mpvDir -Recurse | ForEach-Object { Write-Host $_.FullName }
            Write-Error "mpv.exe missing after extraction"
            exit 1
          }
          Write-Host "mpv binary in place:"
          Get-ChildItem $mpvDir | Select-Object Name, Length

      - name: Build Windows installer
        run: npm run dist:win
        env:
          # No code-signing certificate configured. Output is unsigned;
          # SmartScreen will warn on first run but allow "Run anyway".
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload installer as artifact
        uses: actions/upload-artifact@v4
        with:
          name: htflix-windows-installer
          path: |
            dist-build/*.exe
            dist-build/*.exe.blockmap
          if-no-files-found: error
          retention-days: 30

      - name: Attach installer to release (only on tag push)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist-build/*.exe
            dist-build/*.exe.blockmap
          fail_on_unmatched_files: true
