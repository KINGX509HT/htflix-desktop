<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'none';
    style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
    font-src https://fonts.gstatic.com;
    script-src 'self' 'unsafe-inline';
    img-src 'self' data:;
    connect-src 'none';
    object-src 'none';
    frame-src 'none';
    base-uri 'none';
    form-action 'none';
  " />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }

    #panel {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    #logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 96px;
      color: #E50914;
      letter-spacing: 10px;
      margin-left: 10px; /* compensate trailing letter-spacing */
      opacity: 0;
      transform: scale(0.28);
      will-change: transform, opacity;
    }

    /* Step 1: fade in */
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* Step 2: spring expand — done via JS for precise timing */
  </style>
</head>
<body>
  <div id="panel">
    <div id="logo">HTFLIX</div>
  </div>

  <script>
    const logo  = document.getElementById('logo');
    const panel = document.getElementById('panel');

    function ease(t) {
      // easeOutBack
      const c1 = 1.70158, c3 = c1 + 1;
      return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
    }

    function animateTo(el, from, to, duration, property, unit, cb) {
      const start = performance.now();
      function step(now) {
        const p = Math.min((now - start) / duration, 1);
        const val = from + (to - from) * ease(p);
        el.style[property] = property === 'transform'
          ? `scale(${val})`
          : val + unit;
        if (p < 1) requestAnimationFrame(step);
        else if (cb) cb();
      }
      requestAnimationFrame(step);
    }

    function slidePanel(cb) {
      const start = performance.now();
      const duration = 520;
      function easeInCubic(t) { return t * t * t; }
      function step(now) {
        const p = Math.min((now - start) / duration, 1);
        const x = -window.innerWidth * easeInCubic(p);
        panel.style.transform = `translateX(${x}px)`;
        if (p < 1) requestAnimationFrame(step);
        else if (cb) cb();
      }
      requestAnimationFrame(step);
    }

    // ── Sequence ──────────────────────────────────────────────────────────────

    // 1. Snap in (opacity 0 → 1 instantly)
    setTimeout(() => {
      logo.style.opacity = '1';

      // 2. Spring expand (0.28 → 1.0) over 750ms
      animateTo(logo, 0.28, 1, 750, 'transform', '', () => {

        // 3. Hold for 1700ms
        setTimeout(() => {

          // 4. Slide panel to the left
          slidePanel(() => {

            // 5. Signal main process to close splash + show main window
            if (window.electronSplash) {
              window.electronSplash.done();
            }
          });

        }, 1700);
      });
    }, 100);
  </script>
</body>
</html>
